<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پەڕاوگە و فۆتۆکۆپی زانست</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700;800&display=swap');

  :root{
    --ink:#0f1729;
    --gold:#d4a64a;
    --gold-soft:#f0d99b;
    --bg1:#141d33;
    --bg2:#0a0f1d;
    --card:rgba(255,255,255,.06);
    --stroke:rgba(255,255,255,.12);
    --txt:#eef1f8;
    --muted:#9aa3bd;
    --green:#25d366;
    --blue:#1877f2;
    --viber:#7360f2;
    --tg:#2aabee;
    --map:#ea4335;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:'Noto Naskh Arabic',serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(212,166,74,.18), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(42,171,238,.12), transparent 55%),
      linear-gradient(160deg,var(--bg1),var(--bg2));
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
    color:var(--txt);
  }
  .card{
    width:100%;
    max-width:440px;
    background:rgba(18,25,44,.72);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid var(--stroke);
    border-radius:28px;
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.55);
  }

  /* ---- Carousel ---- */
  .carousel{position:relative;width:100%;aspect-ratio:16/11;overflow:hidden;}
  .track{
    display:flex;
    width:100%;height:100%;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
    scroll-behavior:smooth;
    -ms-overflow-style:none;scrollbar-width:none;
  }
  .track::-webkit-scrollbar{display:none;}
  .slide{flex:0 0 100%;width:100%;height:100%;scroll-snap-align:center;}
  .slide img{width:100%;height:100%;object-fit:cover;display:block;}
  .carousel::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(to top, rgba(10,15,29,.95) 0%, rgba(10,15,29,.35) 35%, transparent 60%);
  }
  .overlay{
    position:absolute;left:0;right:0;bottom:0;z-index:2;
    padding:22px 24px 20px;text-align:center;
  }
  .overlay h1{
    font-size:1.75rem;font-weight:800;line-height:1.35;
    text-shadow:0 2px 18px rgba(0,0,0,.6);
    background:linear-gradient(180deg,#fff,var(--gold-soft));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .overlay .addr{
    margin-top:6px;font-size:1rem;color:#dfe4f1;font-weight:500;
    display:flex;align-items:center;justify-content:center;gap:6px;
    text-shadow:0 1px 10px rgba(0,0,0,.7);
  }
  .overlay .addr svg{width:16px;height:16px;fill:var(--gold);}
  .dots{
    position:absolute;top:14px;left:50%;transform:translateX(-50%);
    z-index:3;display:flex;gap:7px;
  }
  .dots b{
    width:7px;height:7px;border-radius:50%;
    background:rgba(255,255,255,.45);transition:.3s;cursor:pointer;
  }
  .dots b.on{background:var(--gold);width:22px;border-radius:4px;}

  /* ---- Phone ---- */
  .phone{
    margin:18px 22px 4px;
    display:flex;align-items:center;justify-content:center;gap:12px;
    padding:14px;border-radius:16px;
    background:linear-gradient(135deg,rgba(212,166,74,.18),rgba(212,166,74,.06));
    border:1px solid rgba(212,166,74,.35);
  }
  .phone .pico{width:44px;height:44px;border-radius:14px;
    background:linear-gradient(145deg,#e6bf6a,#c79234);
    box-shadow:0 6px 16px rgba(199,146,52,.4), inset 0 1px 0 rgba(255,255,255,.4);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .phone .pico svg{width:23px;height:23px;fill:var(--ink);}
  .phone .pnum{direction:ltr;text-align:left;}
  .phone .pnum small{display:block;font-size:.72rem;color:var(--gold-soft);letter-spacing:.5px;}
  .phone .pnum span{font-size:1.3rem;font-weight:800;letter-spacing:1px;}

  /* ---- Links ---- */
  .links{padding:16px 22px 24px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .btn{
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;
    padding:18px 10px;border-radius:18px;text-decoration:none;color:#fff;
    font-size:1rem;font-weight:600;
    background:var(--card);border:1px solid var(--stroke);
    transition:transform .18s ease, border-color .18s, background .18s;
    position:relative;overflow:hidden;
  }
  .btn:hover{transform:translateY(-3px);}
  .btn:active{transform:translateY(0);}
  .btn:focus-visible{outline:3px solid var(--gold);outline-offset:2px;}
  .btn .ico{
    width:50px;height:50px;border-radius:16px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 20px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.25);
    transition:transform .18s ease;
  }
  .btn:hover .ico{transform:scale(1.08);}
  .btn .ico svg{width:27px;height:27px;fill:#fff;filter:drop-shadow(0 1px 2px rgba(0,0,0,.25));}
  .btn.full{grid-column:1 / -1;flex-direction:row;gap:14px;padding:16px;}
  .whatsapp .ico{background:linear-gradient(145deg,#42e16e,#1da851);}
  .viber .ico{background:linear-gradient(145deg,#8b7bff,#5d4be0);}
  .telegram .ico{background:linear-gradient(145deg,#3ec0fa,#1d96d4);}
  .facebook .ico{background:linear-gradient(145deg,#3b8bff,#0d63d6);}
  .instagram .ico{background:linear-gradient(135deg,#feda75,#fa7e1e 30%,#d62976 60%,#962fbf 80%,#4f5bd5);}
  .tiktok .ico{background:linear-gradient(145deg,#222,#000);}
  .maps .ico{background:linear-gradient(145deg,#ff5a4d,#d22f1f);}

  .foot{
    text-align:center;padding:16px;font-size:.82rem;color:var(--muted);
    border-top:1px solid var(--stroke);
  }
  @media (prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important;}}
</style>
</head>

<script>
  const track = document.getElementById('track');
  const dots  = document.getElementById('dots');
  const slides = track.querySelectorAll('.slide');

  function buildDots(){
    dots.innerHTML = '';
    if(slides.length < 2) return;
    slides.forEach((_, i)=>{
      const d = document.createElement('b');
      if(i===0) d.classList.add('on');
      d.addEventListener('click', ()=> track.scrollTo({left:i*track.clientWidth, behavior:'smooth'}));
      dots.appendChild(d);
    });
  }
  buildDots();

  track.addEventListener('scroll', ()=>{
    const i = Math.round(track.scrollLeft / track.clientWidth);
    dots.querySelectorAll('b').forEach((d,idx)=> d.classList.toggle('on', idx===i));
  });
</script>
